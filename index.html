        // --- FULLY DETAILED CLINICAL DATA (ALL 57 TOPICS & 7-POINT STRUCTURE) ---
        const bookData = {
          internal: {
            title: "Internal Med",
            icon: <IconActivity className="w-5 h-5" />,
            topics: [
              {
                id: 'general_clerking',
                title: 'General Clerking',
                content: `### 1. General Clerking\n- Cases are usually seen in ED and referrals in periphery. Clerking is done in eHIS as *(Generic Progress Note)*.\n- Start by type of review: *(medical review in: red zone/yellow zone/peri etc)*\n- s/b Dr [Name] (seen by MO/specialist)\n- * Referred for...\n### 2. Current Problem / General Complaints\n- **Age/Race/Sex**\n- **Co-morbids** (k/c/o) - underlying disease, years diagnosed, medication, current follow up, other issues. *(eg: DM 7 years, on OHA (T MTF 500mg TDS), under f/up KK Ampang)*\n- **Presented with...** (p/w or c/o) *(Eg: p/w Cough 1/7 - productive with yellowish sputum, minimal amount, no blood)*\n- **Otherwise** *(Eg: NO fever, No UTI sx, no abdominal pain etc)*\n- **Social Hx** - Occupation, Marital status, smoking/alcohol etc\n- **Family Hx** - Strong hx of DM/HPT/Stroke/Ca/IHD *(eg: mother died of IHD, 80 years old with underlying HPT)*\n### 3. Physical Examination\n- **O/e:** Alert, conscious, non tachypnoic, hydration fair etc\n- **V/s:** BP, PR, RR, SpO2, T\n- Lungs bibasal crepitations, CVS S1S2 DRNM, No pedal edema\n### 4. Analysis / Assessment\n- ECG: SR, no acute ischaemic changes\n### 5. Lab & Imaging\n- **Lab:** LINK relevant results\n- **Imaging:** comment on CXR, CT brain etc *(Eg: CXR clear lung fields)*\n### 6. Medication, Management & Diagnosis\n- **Medication:** Pt's old meds... T MTF 500mg TDS...etc\n- **Management:** management/plan carried out in ED *(eg: In ED given crushed Aspirin 300mg stat...)*\n- **Diagnosis:** give an impression *(Imp: 1) CAP)*\n- **Plan:** Admit ward 6B acute, IV Rocephine 2g stat BD, etc\n- **Investigations:** septic workout, FBC/RP/LFT etc\n### 7. Writing an Entry in Ward\n- **Admission review** - must be done for all patients, and presented to specialist on call.\n- **AM/PM/On-call review**\n- **Transfer Out summary** -> for patients who are being transferred out to another ward\n- **Transfer In summary** -> for patients transferred in from other wards\n- Entry format: Date/Time, then *(Type of Review: Admission/AM/PM/On Call)*, then s/b Dr [Name] @ time (seen by MO/Specialist).\n- Worked example: 75 years old / Malay / gentleman. k/c/o: 1) HPT (10 years) on T Perindopril 2mg OD, f/up KK Ampang. 2) DM (10 years) on OHA, f/up KK Ampang.\n- Current Imp: 1) CAP. p/w: 1) Cough 3/7 - productive with yellowish sputum.\n- Otherwise: no fever, no LOA/LOW etc. Social Hx.... F Hx....\n- On Arrival in ED: o/e: Alert, conscious. BP 120/30, PR 88, RR 20, SpO2 99% RA, T 38, DXT 5.6. Lungs clear, CVS DRNM, PA soft non tender, no pedal edema.\n- ECG: SR, no acute ischaemic changes. CXR: bibasal haziness. FBC: Hb.. WCC 13. RP:.... LFT:....\n- Pt's Old Medications: T. Perindopril 2mg OD, T MTF 500mg TDS.\n- Progress: currently well, no active complaints, no SOB, minimal cough.\n- Ix: Septic workout, FBC/RP/LFT c/m. Plan: 1) septic workout 2) IV Rocephine 2g stat then OD.\n### 8. Documentation Notes\n- Documentation is very important medico-legally, so make sure everything is documented properly!\n- S/T MO/specialist... D/w specialist... Requests for blood or radiology imaging etc MUST be documented.\n- Any events, other than ward round reviews should be documented as *(Ad-hoc entry)*.\n- *(Retrospective entry)* may be used if you are unable to document during time of the event, hence you may come back and document it later.\n- When seen by MO/specialist, *(case and progress noted)* is written, followed by progress, physical examination and plan.\n- Always remember to sign off and stamp every entry.`,
                images: [
                  { src: 'images/internal/general_clerking/01-general-clerking-template.png', caption: 'General Clerking template' },
                  { src: 'images/internal/general_clerking/02-ward-entry-example-1.jpg', caption: 'Writing a ward entry — worked example (1/2)' },
                  { src: 'images/internal/general_clerking/03-ward-entry-example-2.jpg', caption: 'Writing a ward entry — worked example (2/2)' }
                ]
              },
              {
                id: 'acs',
                title: 'ACS (Acute Coronary Syndrome)',
                content: `### 1. Definition / Introduction\n- Encompasses Unstable Angina (UA) and NSTEMI. Imbalance of myocardial oxygen supply/demand due to subtotal occlusive thrombus.\n### 2. Etiology / Risk Factors\n- Modifiable: HTN, DM, Dyslipidemia, Smoking, Obesity. Non-modifiable: Age, Male gender, FHx of premature CAD.\n### 3. Clinical Presentation\n- Ischemic chest pain (crushing/heavy), radiates to jaw/arm, diaphoresis. Atypical in elderly/females (epigastric pain, syncope).\n### 4. Diagnostic Criteria / Classifications\n- NSTEMI: Ischemic symptoms + ECG changes + **Elevated Biomarkers**.\n- UA: Ischemic symptoms + **Normal Biomarkers**.\n### 5. Investigations\n- 12-lead ECG: ST depression (≥0.5mm), T-wave inversion. (May be normal in UA).\n- Biomarkers: Serial Troponin T/I (0h and 3h/6h).\n- Bloods: FBC, RP, LFT, Lipids. Portable CXR.\n### 6. Comprehensive Management\n- Acute: Admit CCU. Oxygen ONLY if SpO2 <90%. Analgesia (SL GTN 0.5mg PRN, IV Morphine 2-5mg).\n- DAPT: T. Aspirin 300mg stat + T. Clopidogrel 300mg stat.\n- Anticoagulation: S/C Enoxaparin 1mg/kg BD.\n- GDMT: T. Atorvastatin 40-80mg ON, Beta-blocker (Bisoprolol).\n- Plan: Calculate TIMI score. High risk = Early Angiogram.\n### 7. Complications\n- Arrhythmias (VT/VF), Acute Heart Failure, Mechanical complications.`,
                images: [
                  { src: 'images/internal/acs/01-acs-overview-classification.jpg', caption: 'ACS overview & UA/NSTEMI/STEMI classification' },
                  { src: 'images/internal/acs/02-acs-history-examination.jpg', caption: 'Clerking: history & physical examination' },
                  { src: 'images/internal/acs/03-acs-management-plan.jpg', caption: 'Management & ward plan' },
                  { src: 'images/internal/acs/04-timi-risk-score.jpg', caption: 'TIMI Risk Score (UA/NSTEMI)' }
                ]
              },
              { 
                id: 'stemi',
                title: 'Acute STEMI',
                content: `### 1. Definition / Introduction\n- Medical emergency: Complete occlusion of major epicardial coronary artery causing transmural necrosis.\n### 2. Etiology / Risk Factors\n- Plaque rupture leading to complete thrombosis. Risks: HTN, DM, Smoking, Dyslipidemia.\n### 3. Clinical Presentation\n- Severe crushing central chest pain >20 mins. Profuse sweating, impending doom. Vagal response in inferior STEMI (vomiting, bradycardia).\n### 4. Diagnostic Criteria / Classifications\n- New ST elevation at J point in 2 contiguous leads: ≥2.5mm men <40, ≥2mm men ≥40, ≥1.5mm women in V2-V3. ≥1mm in other leads. OR New LBBB.\n### 5. Investigations\n- Urgent 12-lead ECG (<10 mins). Identifies territory.\n- Cardiac Biomarkers: Send Troponin, but DO NOT DELAY therapy.\n- Bloods: FBC, RP, Coag. CXR to rule out aortic dissection.\n### 6. Comprehensive Management\n- Acute: Activate Code STEMI. Defibrillator standby. Oxygen if SpO2 <90%.\n- DAPT: T. Aspirin 300mg stat + T. Clopidogrel 600mg stat (PCI) or 300mg (Thrombolysis).\n- Analgesia: IV Morphine 2-5mg + IV Maxolon 10mg.\n- Reperfusion: Primary PCI (Door-to-balloon <90 mins) is Gold Standard.\n- Thrombolysis: If PCI unavailable <120 mins. IV Streptokinase (Door-to-needle <30 mins). S/C Enoxaparin post-lysis.\n### 7. Complications\n- Killip Class I-IV (HF to Cardiogenic shock). Dressler's syndrome, Free wall rupture.`,
                images: [
                  { src: 'images/internal/stemi/01-stemi-sgarbossa-criteria-diagnosis-history.png', caption: 'Sgarbossa\'s Criteria, clinical diagnosis & history' },
                  { src: 'images/internal/stemi/02-stemi-ecg-localization-blood-supply.png', caption: 'ECG localization of STEMI & coronary blood supply' },
                  { src: 'images/internal/stemi/03-stemi-reperfusion-fibrinolytic-therapy.png', caption: 'Reperfusion strategy & fibrinolytic therapy' },
                  { src: 'images/internal/stemi/04-stemi-failed-fibrinolysis-pci.png', caption: 'Failed fibrinolysis & PCI (stent placement)' },
                  { src: 'images/internal/stemi/05-stemi-cabg.png', caption: 'CABG (coronary artery bypass graft)' },
                  { src: 'images/internal/stemi/06-stemi-ccu-care-complications.png', caption: 'CCU care, Killip classification & complications of MI' },
                  { src: 'images/internal/stemi/07-stemi-management-flowchart-risk-stratification.png', caption: 'Management of complications, risk stratification & STEMI flow chart' }
                ]
              },
              { 
                id: 'hf', 
                title: 'Heart Failure', 
                content: `### 1. Definition / Introduction\n- Clinical syndrome caused by structural/functional cardiac abnormalities leading to reduced cardiac output and elevated intracardiac pressures.\n### 2. Etiology / Risk Factors\n- IHD (most common), HTN, Valvular disease, Cardiomyopathy, Arrhythmias.\n### 3. Clinical Presentation\n- Left: Dyspnea on exertion, Orthopnea, PND, bibasal crepitations.\n- Right: Peripheral pitting edema, elevated JVP, tender hepatomegaly.\n### 4. Diagnostic Criteria / Classifications\n- LVEF: HFrEF (≤40%), HFmrEF (41-49%), HFpEF (≥50%). NYHA Class I-IV.\n### 5. Investigations\n- NT-proBNP: Highly sensitive to rule out HF.\n- Echo: Confirms diagnosis, LVEF, valves.\n- Bloods: FBC, RP, LFT, TFT. ECG, CXR (Cardiomegaly, Kerley B lines).\n### 6. Comprehensive Management\n- General: Fluid restrict (1-1.5L/day), salt restrict, daily weights.\n- GDMT (Fantastic 4): ARNI/ACEi (Entresto), Beta-Blocker (Bisoprolol), MRA (Spironolactone), SGLT2i (Dapagliflozin).\n- Symptomatic: Loop diuretics (PO Furosemide).\n### 7. Complications\n- Cardiorenal syndrome, Arrhythmias, Refractory shock.` 
              },
              { 
                id: 'ahf', 
                title: 'Acute Heart Failure', 
                content: `### 1. Definition / Introduction\n- Rapid onset or worsening of symptoms of heart failure requiring urgent medical therapy.\n### 2. Etiology / Risk Factors\n- CHAMP precipitants: ACS, Hypertensive emergency, Arrhythmia, Acute Mechanical cause, Pulmonary Embolism.\n### 3. Clinical Presentation\n- Severe respiratory distress, hypoxia, frothy pink sputum, loud S3 gallop, widespread pulmonary crepitations.\n### 4. Diagnostic Criteria / Classifications\n- Forrester Classification (Warm/Cold vs Wet/Dry perfusion status).\n### 5. Investigations\n- Urgent ECG, ABG/VBG, Portable CXR, NT-proBNP, Cardiac enzymes, RP.\n### 6. Comprehensive Management\n- Acute Resuscitation: Prop up patient 45 degrees. Oxygen therapy / NIV (CPAP/BiPAP) if persistent hypoxemia.\n- **L-M-N-O Protocol:**\n- **L**asix: IV Furosemide 40-80mg stat.\n- **M**orphine: (Rarely used now).\n- **N**itrates: IV GTN infusion if SBP > 110 mmHg.\n- **O**xygen.\n- Ward: Insert CBD for strict I/O monitoring. Treat precipitating cause.\n### 7. Complications\n- Respiratory failure requiring intubation, Cardiogenic shock, AKI.` 
              },
              { 
                id: 'chf', 
                title: 'Chronic Heart Failure', 
                content: `### 1. Definition / Introduction\n- Long-term stable management phase of heart failure aimed at preventing remodeling and reducing mortality.\n### 2. Etiology / Risk Factors\n- Progression of underlying HFrEF or HFpEF.\n### 3. Clinical Presentation\n- Stable but reduced exercise tolerance, chronic baseline peripheral edema, easily fatigued.\n### 4. Diagnostic Criteria / Classifications\n- Monitored via NYHA Functional Classification.\n### 5. Investigations\n- Serial Echocardiograms, regular Renal Profile monitoring (due to GDMT drugs), HbA1c, Lipid profile.\n### 6. Comprehensive Management\n- Ward/Discharge Plan: Optimization of GDMT (ARNI, Beta-blocker, MRA, SGLT2i) to maximum tolerated doses.\n- Patient education: Strict daily weights (alert if >2kg in 3 days).\n- Device therapy: ICD (primary prevention if EF <35%) or CRT.\n- Vaccination: Influenza and Pneumococcal vaccines.\n### 7. Complications\n- Frequent acute exacerbations, arrhythmias, progressive pump failure leading to end-stage heart failure.` 
              },
              { 
                id: 'stroke', 
                title: 'Stroke', 
                content: `### 1. Definition / Introduction\n- Acute focal neurological deficit persisting >24 hours of vascular origin (Ischemic 80%, Hemorrhagic 20%).\n### 2. Etiology / Risk Factors\n- Ischemic: Thrombotic (atherosclerosis), Embolic (AF, valvular disease).\n- Hemorrhagic: HTN, Amyloid angiopathy, AVM, Aneurysm.\n### 3. Clinical Presentation\n- FAST: Facial droop, Arm weakness, Speech difficulty, Time.\n- Hemorrhagic: Sudden severe headache, vomiting, reduced GCS.\n### 4. Diagnostic Criteria / Classifications\n- Bamford Classification (TACS, PACS, LACS, POCS).\n### 5. Investigations\n- **Urgent CT Brain plain** (CRITICAL to rule out bleed before aspirin/thrombolysis).\n- CBG (rule out hypoglycemia).\n- ECG, FBC, RP, Coagulation profile, Lipid profile, Carotid Doppler, Echo.\n### 6. Comprehensive Management\n- Ischemic: Activate stroke team for IV Thrombolysis (Alteplase) if within 4.5h window. If beyond window: T. Aspirin 300mg stat. Permissive HTN (do not lower BP acutely unless >220/120).\n- Hemorrhagic: Strict BP control (IV Labetalol target SBP 140), reverse coagulopathy, refer Neurosurgery.\n- Ward: VTE prophylaxis, swallow assessment.\n### 7. Complications\n- Aspiration pneumonia, DVT/PE, Cerebral edema/herniation, Hemorrhagic transformation.` 
              },
              { 
                id: 'dengue', 
                title: 'Dengue Fever', 
                content: `### 1. Definition / Introduction\n- Acute mosquito-borne viral infection (Flavivirus) transmitted by Aedes aegypti.\n### 2. Etiology / Risk Factors\n- Endemic areas, stagnant water. Secondary infection with different serotype increases risk of Severe Dengue.\n### 3. Clinical Presentation\n- Febrile phase (Day 1-3): High fever, retro-orbital pain, myalgia, rash.\n- Critical phase (Day 3-6): Defervescence, risk of vascular leak.\n- Recovery phase: Isles of white in sea of red rash, bradycardia.\n### 4. Diagnostic Criteria / Classifications\n- Dengue without warning signs, WITH warning signs (abdo pain, vomiting, fluid accumulation, mucosal bleed, lethargy, liver >2cm, rising HCT with dropping Plt), Severe Dengue (Shock, Bleed, Organ failure).\n### 5. Investigations\n- Dengue NS1 Ag (Day 1-5), IgM/IgG.\n- **FBC:** Serial monitoring of HCT and Plt.\n- RP, LFT, VBG/Lactate, US Abdomen.\n### 6. Comprehensive Management\n- Outpatient: ORS, Paracetamol (NO NSAIDs). Daily FBC.\n- Inpatient: Strict I/O. Fluid therapy (NS/Sterofundin) titrated based on HCT, pulse pressure, urine output (Target >0.5ml/kg/hr).\n- Transfuse platelets ONLY if active bleeding.\n### 7. Complications\n- Dengue Shock Syndrome (DSS), Severe Dengue Hepatitis, Fluid overload.` 
              },
              { 
                id: 'dm', 
                title: 'Diabetes Mellitus', 
                content: `### 1. Definition / Introduction\n- Chronic metabolic disorder characterized by hyperglycemia due to absolute (Type 1) or relative (Type 2) insulin deficiency.\n### 2. Etiology / Risk Factors\n- T2DM: Obesity, genetics, sedentary lifestyle, PCOS, history of GDM.\n### 3. Clinical Presentation\n- Polyuria, polydipsia, polyphagia, weight loss, blurry vision, recurrent infections, delayed wound healing.\n### 4. Diagnostic Criteria / Classifications\n- FPG ≥ 7.0 mmol/L, RPG ≥ 11.1 mmol/L with symptoms, or HbA1c ≥ 6.3%.\n### 5. Investigations\n- HbA1c, FPG, Renal Profile, LFT, Fasting Lipids, Urine Microalbumin/Creatinine Ratio (ACR), Fundoscopy, ECG.\n### 6. Comprehensive Management\n- Lifestyle: Diet control, exercise, weight loss.\n- First-line: T. Metformin (if eGFR >30).\n- Add-on therapies: SGLT2i (if HF/CKD), GLP-1 RA, Sulfonylurea.\n- Insulin therapy (Basal, Premixed, or Basal-Bolus) if poorly controlled.\n### 7. Complications\n- Microvascular: Retinopathy, Nephropathy, Neuropathy.\n- Macrovascular: CAD, Stroke, Peripheral Arterial Disease.\n- Acute: DKA, HHS, Hypoglycemia.` 
              },
              { 
                id: 'dka', 
                title: 'DKA', 
                content: `### 1. Definition / Introduction\n- Life-threatening acute complication of diabetes characterized by hyperglycemia, ketonemia, and metabolic acidosis.\n### 2. Etiology / Risk Factors\n- Insulin non-compliance, Infection, ACS, Stroke, Trauma, Pregnancy, New onset DM.\n### 3. Clinical Presentation\n- Polyuria, polydipsia, vomiting, generalized abdominal pain, Kussmaul breathing, fruity breath odor, altered sensorium, dehydration.\n### 4. Diagnostic Criteria / Classifications\n- Triad: CBG > 11.1 mmol/L + pH < 7.3 or HCO3 < 15 + Blood Ketones > 3.0 or Urine Ketones ≥ 2+.\n### 5. Investigations\n- VBG (to check pH and HCO3), Blood Ketones.\n- RP (Crucial for Potassium and Urea), Serum Osmolality.\n- Look for precipitant: FBC, CRP, Urine FEME, CXR, ECG.\n### 6. Comprehensive Management\n- 1. FLUIDS (Most Critical): IV Normal Saline (e.g., 1L/1h, then 1L/2h, based on deficit).\n- 2. INSULIN: IV fixed dose regular insulin infusion at 0.1 u/kg/hr. DO NOT start if K+ < 3.3.\n- 3. POTASSIUM: Replace proactively in IV fluids (insulin drives K+ into cells).\n- Change to IV Dextrose 5% when CBG falls < 14 mmol/L to prevent hypoglycemia.\n### 7. Complications\n- Hypokalemia, Hypoglycemia, Cerebral Edema, ARDS.` 
              },
              { 
                id: 'htncrisis', 
                title: 'Hypertensive Crisis', 
                content: `### 1. Definition / Introduction\n- Severe elevation in blood pressure (usually >180/120 mmHg).\n### 2. Etiology / Risk Factors\n- Medication non-compliance, sympathomimetic drugs (cocaine), renal artery stenosis, acute glomerulonephritis, pre-eclampsia.\n### 3. Clinical Presentation\n- Headache, blurring of vision, chest pain, dyspnea, neurological deficits, encephalopathy.\n### 4. Diagnostic Criteria / Classifications\n- HTN Emergency: Severe BP elevation WITH acute target organ damage (TOD).\n- HTN Urgency: Severe BP elevation WITHOUT target organ damage.\n### 5. Investigations\n- ECG (Ischemia/LVH), CXR (Pulmonary edema).\n- Urine FEME (Protein/blood indicates renal damage).\n- Bloods: RP (AKI), Cardiac enzymes.\n- Fundoscopy (Papilledema = Malignant HTN).\n### 6. Comprehensive Management\n- Emergency: Admit HDU/ICU. Lower BP by max 25% in 1st hour, then to 160/100 over next 2-6h using IV agents (Labetalol, GTN, Nicardipine). Exception: Aortic dissection needs rapid reduction.\n- Urgency: Lower BP gradually over 24-48h with oral agents (Amlodipine, Captopril). Do NOT drop rapidly to avoid cerebral ischemia.\n### 7. Complications\n- Stroke (Ischemic/Hemorrhagic), Myocardial Infarction, Aortic Dissection, Acute Renal Failure.` 
              },
              { 
                id: 'asthma', 
                title: 'Bronchial Asthma', 
                content: `### 1. Definition / Introduction\n- Chronic airway inflammatory disease characterized by airway hyperresponsiveness and reversible airflow obstruction.\n### 2. Etiology / Risk Factors\n- Atopy, family history, allergens (dust, pollen), URTI, exercise, cold air, smoking.\n### 3. Clinical Presentation\n- Recurrent wheezing, shortness of breath, chest tightness, chronic dry cough (worse at night/early morning).\n### 4. Diagnostic Criteria / Classifications\n- Spirometry: FEV1/FVC < 0.70, with reversibility (FEV1 increases >12% and 200ml post-bronchodilator).\n### 5. Investigations\n- PEFR (Peak flow variability). Allergy testing (IgE). CXR (usually normal, done to rule out alternative diagnoses).\n### 6. Comprehensive Management\n- Controller: Inhaled Corticosteroids (ICS) e.g., Budesonide or Fluticasone.\n- Reliever: Short-acting beta-agonist (SABA) e.g., Salbutamol PRN.\n- Step-up therapy: Add LABA (Symbicort), LTRA (Montelukast).\n- Educate on inhaler technique and trigger avoidance.\n### 7. Complications\n- Acute Exacerbation, Status Asthmaticus, Airway remodeling.` 
              },
              {

                content: `### 1. Definition / Introduction\n- Comprehensive medical and psychological care provided to pregnant women from conception to onset of labor, aiming to ensure a healthy mother and baby.\n### 2. Etiology / Risk Factors\n- High-risk pregnancies: Advanced maternal age (>35), obesity, multiple gestation, pre-existing conditions (DM, HTN), previous bad obstetric history (stillbirth, recurrent miscarriage).\n### 3. Clinical Presentation\n- Routine monitoring of physiological changes in pregnancy.\n- Symptoms to monitor: Vaginal bleeding, leaking liquor, reduced fetal movements, severe headache, epigastric pain.\n### 4. Diagnostic Criteria / Classifications\n- Trimesters: 1st (0-13w), 2nd (14-27w), 3rd (28w-delivery).\n### 5. Investigations\n- Booking bloods (<12 weeks): FBC (anemia), Blood Group & Rhesus, VDRL, HIV, Hep B (HBsAg).\n- OGTT (Oral Glucose Tolerance Test): If high risk for GDM (BMI >27, FHx of DM, previous macrosomia).\n- Scans: Dating Scan (Crown-Rump Length most accurate in 1st trimester), Detailed Anomaly Scan (18-22 weeks).\n- Routine: Urine FEME & proteinuria, BP check at every visit.\n### 6. Comprehensive Management\n- Supplements: Folic Acid 5mg (prevent neural tube defects), Iron tablets (Obimin/Zincofer), Vitamin C, Calcium.\n- Monitoring: Weight gain, symphysio-fundal height (SFH) charting, fetal heart rate, kick chart (>28 weeks).\n- Immunization: Tetanus toxoid.\n- Treat complications early (e.g., Aspirin for high risk of pre-eclampsia).\n### 7. Complications (To Prevent/Detect)\n- Pre-eclampsia, Gestational Diabetes, Anemia, Fetal growth restriction (FGR), Preterm labor.`

              {

        function App() {
          const [activeCategory, setActiveCategory] = useState('internal');
          const [activeTopicId, setActiveTopicId] = useState(bookData['internal'].topics[0].id);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [lightboxImage, setLightboxImage] = useState(null);

          const handleCategoryChange = (catKey) => {
            setActiveCategory(catKey);
            setActiveTopicId(bookData[catKey].topics[0].id);
            setIsMobileMenuOpen(false);
          };

          const currentCategoryData = bookData[activeCategory];
          const activeTopic = currentCategoryData.topics.find(t => t.id === activeTopicId);

          return (
            <div className="min-h-screen flex flex-col font-sans text-slate-800 overflow-x-hidden">
              
              {/* HEADER */}
              <header className="bg-gradient-to-r from-pink-500 to-rose-400 text-white shadow-md sticky top-0 z-20">
                <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center overflow-hidden">
                  <div className="flex items-center space-x-2 truncate">
                    <IconBookOpen className="w-6 h-6 md:w-8 md:h-8 flex-shrink-0 text-pink-100" />
                    <h1 className="text-xl md:text-2xl font-extrabold tracking-tight truncate">Hanis's PinkBook</h1>
                  </div>
                  
                  <button 
                    className="md:hidden p-2 bg-pink-600 rounded-lg hover:bg-pink-700 transition flex-shrink-0"
                    onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                  >
                    {isMobileMenuOpen ? <IconX className="w-5 h-5" /> : <IconMenu className="w-5 h-5" />}
                  </button>
                </div>

                <div className="hidden md:flex flex-wrap bg-pink-600 px-4">
                  <div className="max-w-7xl mx-auto flex space-x-1 overflow-x-auto">
                    {Object.entries(bookData).map(([key, data]) => (
                      <button
                        key={key}
                        onClick={() => handleCategoryChange(key)}
                        className={`flex items-center space-x-2 px-5 py-3 text-sm font-semibold transition-colors duration-200 ${
                          activeCategory === key 
                            ? 'bg-pink-50 text-pink-700 rounded-t-lg border-b-2 border-pink-500 shadow-sm' 
                            : 'text-pink-100 hover:bg-pink-500 hover:text-white'
                        }`}
                      >
                        {data.icon}
                        <span>{data.title}</span>
                      </button>
                    ))}
                  </div>
                </div>
              </header>

              {isMobileMenuOpen && (
                <div className="md:hidden bg-pink-600 shadow-inner z-10 w-full">
                  {Object.entries(bookData).map(([key, data]) => (
                    <button
                      key={key}
                      onClick={() => handleCategoryChange(key)}
                      className={`w-full flex items-center space-x-3 px-6 py-4 text-left font-medium border-b border-pink-500 ${
                        activeCategory === key ? 'bg-pink-700 text-white' : 'text-pink-100'
                      }`}
                    >
                      {data.icon}
                      <span>{data.title}</span>
                    </button>
                  ))}
                </div>
              )}

              {/* MAIN CONTENT AREA */}
              <main className="flex-grow max-w-7xl mx-auto w-full flex flex-col md:flex-row py-4 px-2 md:py-6 md:px-4 gap-4 md:gap-6 overflow-hidden">
                
                <aside className="w-full md:w-1/3 lg:w-1/4 flex flex-col space-y-2 flex-shrink-0">
                  <h2 className="text-base md:text-lg font-bold text-pink-700 uppercase tracking-wider mb-1 flex items-center border-b border-pink-200 pb-2 px-2">
                    {currentCategoryData.icon}
                    <span className="ml-2 truncate">{currentCategoryData.title}</span>
                  </h2>
                  
                  <div className="bg-white rounded-xl shadow-sm border border-pink-100 overflow-hidden flex flex-col">
                    <div className="max-h-[50vh] md:max-h-[70vh] overflow-y-auto p-2 space-y-1">
                      {currentCategoryData.topics.map((topic) => (
                        <button
                          key={topic.id}
                          onClick={() => {
                            setActiveTopicId(topic.id);
                            if(window.innerWidth < 768) {
                              setTimeout(() => window.scrollTo({ top: document.getElementById('content-area').offsetTop - 20, behavior: 'smooth' }), 100);
                            }
                          }}
                          className={`w-full text-left px-3 py-3 md:px-4 rounded-lg text-sm transition-all duration-200 ${
                            activeTopicId === topic.id 
                              ? 'bg-pink-100 text-pink-800 font-bold shadow-inner border-l-4 border-pink-500' 
                              : 'text-slate-600 hover:bg-pink-50 hover:text-pink-600'
                          }`}
                        >
                          {topic.title}
                        </button>
                      ))}
                    </div>
                  </div>
                </aside>

                <section id="content-area" className="w-full max-w-full md:w-2/3 lg:w-3/4 flex flex-col min-w-0 flex-shrink">
                  <div className="bg-white rounded-xl md:rounded-2xl shadow-lg border border-pink-100 p-5 md:p-8 flex-grow overflow-hidden break-words w-full">
                    {activeTopic ? (
                      <>
                        <h3 className="text-xl md:text-3xl font-extrabold text-pink-600 mb-4 pb-3 border-b border-pink-100 break-words">
                          {activeTopic.title}
                        </h3>
                        
                        <div className="text-slate-700 leading-relaxed space-y-3 w-full max-w-full text-sm md:text-base">
                          {activeTopic.content.split('\n').map((line, idx) => {
                            const tLine = line.trim();

                            // 1. Table Parser (Creates beautiful tables)
                            if (tLine.startsWith('|')) {
                                const cells = tLine.split('|').filter(c => c.trim() !== '');
                                const isHeader = tLine.includes('---');
                                if (isHeader) return null; 
                                
                                return (
                                    <div key={idx} className="flex border-b border-pink-200 py-2 bg-pink-50/50 rounded-sm">
                                        {cells.map((c, i) => {
                                            const parts = c.trim().split(/\*\*(.*?)\*\*/g);
                                            return (
                                                <div key={i} className="flex-1 px-2 text-xs md:text-sm font-medium text-slate-700 whitespace-normal break-words">
                                                    {parts.map((p, j) => j % 2 === 1 ? <span key={j} className="font-bold text-slate-900">{p}</span> : p)}
                                                </div>
                                            );
                                        })}
                                    </div>
                                );
                            }

                            // 2. Headers Parser
                            if (tLine.startsWith('###')) {
                              return <h4 key={idx} className="text-lg md:text-xl font-bold text-pink-600 mt-6 mb-2 border-b border-pink-50 pb-1 break-words">{tLine.replace(/^###\s*/, '')}</h4>;
                            }
                            
                            // 3. Bullet Points Parser
                            if (tLine.startsWith('- ')) {
                                const content = tLine.substring(2);
                                const parts = content.split(/\*\*(.*?)\*\*/g);
                                return (
                                    <div key={idx} className="flex items-start gap-2 ml-1 md:ml-3 mt-1">
                                        <span className="text-pink-500 font-bold mt-[1px]">•</span>
                                        <p className="flex-1 break-words min-w-0">
                                            {parts.map((p, j) => j % 2 === 1 ? <span key={j} className="font-bold text-slate-900">{p}</span> : p)}
                                        </p>
                                    </div>
                                );
                            }
                            
                            // 4. Normal Text with Italics Parser
                            if (tLine.startsWith('*(')) {
                                return <p key={idx} className="italic text-pink-500 text-xs md:text-sm mt-4 bg-pink-50 p-3 rounded-lg border border-pink-100 break-words">{tLine.replace(/\*/g, '')}</p>
                            }
                            
                            if (tLine === '') return <div key={idx} className="h-1 md:h-2"></div>;
                            
                            // 5. Normal Text with Bold Parser
                            const parts = tLine.split(/\*\*(.*?)\*\*/g);
                            return (
                                <p key={idx} className="break-words mt-1">
                                    {parts.map((p, j) => j % 2 === 1 ? <span key={j} className="font-bold text-slate-900">{p}</span> : p)}
                                </p>
                            );
                          })}
                        </div>

                        {activeTopic.images && activeTopic.images.length > 0 && (
                          <div className="mt-8 pt-6 border-t border-pink-100">
                            <h4 className="text-lg md:text-xl font-bold text-pink-600 mb-3">Illustrations</h4>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                              {activeTopic.images.map((img, idx) => (
                                <button
                                  key={idx}
                                  onClick={() => setLightboxImage(img)}
                                  className="text-left bg-pink-50 border border-pink-100 rounded-lg overflow-hidden hover:shadow-md transition-shadow"
                                >
                                  <img src={img.src} alt={img.caption || activeTopic.title} className="w-full h-48 object-cover" />
                                  {img.caption && (
                                    <p className="text-xs md:text-sm text-slate-600 p-2">{img.caption}</p>
                                  )}
                                </button>
                              ))}
                            </div>
                          </div>
                        )}
                      </>
                    ) : (
                      <div className="h-full flex items-center justify-center text-pink-300">
                        <p>Select a topic to view details.</p>
                      </div>
                    )}
                  </div>
                </section>
              </main>

              {/* FOOTER & DISCLAIMER */}
              <footer className="bg-pink-100 text-pink-900 border-t border-pink-200 mt-auto py-8">
                <div className="max-w-5xl mx-auto px-4 text-center space-y-2">
                  <p className="font-semibold text-lg text-pink-700">Hanis's PinkBook</p>
                  <div className="bg-pink-50 p-4 rounded-lg border border-pink-200 shadow-sm inline-block text-xs md:text-sm">
                    <span className="font-bold text-red-500">Disclaimer: </span>
                    This information is intended for educational and reference purposes only. It should not be used as a sole basis for diagnosing or treating patients. Always verify and confirm all clinical information and management plans with your supervising doctors, including Medical Officers (MOs), Physicians, and Consultants, before making any clinical decisions. 
                    <br/><br/>
                    <span className="font-bold text-pink-600">(By Hanis Ameera)</span>
                  </div>
                </div>
              </footer>

              {lightboxImage && (
                <div
                  className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4"
                  onClick={() => setLightboxImage(null)}
                >
                  <button
                    className="absolute top-4 right-4 text-white p-2 bg-pink-600 rounded-lg hover:bg-pink-700"
                    onClick={() => setLightboxImage(null)}
                  >
                    <IconX className="w-6 h-6" />
                  </button>
                  <figure className="max-w-4xl max-h-full flex flex-col items-center" onClick={(e) => e.stopPropagation()}>
                    <img src={lightboxImage.src} alt={lightboxImage.caption || ''} className="max-w-full max-h-[80vh] rounded-lg shadow-2xl object-contain" />
                    {lightboxImage.caption && (
                      <figcaption className="text-pink-100 text-sm md:text-base mt-3 text-center">{lightboxImage.caption}</figcaption>
                    )}
                  </figure>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
